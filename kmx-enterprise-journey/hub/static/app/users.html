<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>담당자 추가</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="sub">
  <nav class="top">
    <a href="index.html">← 시작</a>
    <a href="dataset.html">데이터셋</a>
    <a href="sources.html">원천</a>
  </nav>
  <h1>담당자 추가</h1>
  <p>기업이 «승인됨» 상태일 때만 됩니다.</p>
  <form id="f">
    <label>기업 번호</label>
    <input name="tid" type="number" min="1" required />
    <label>이메일</label>
    <input name="email" type="email" required />
    <label>역할</label>
    <select name="role">
      <option value="org_admin">기업 관리자</option>
      <option value="data_steward">데이터 담당</option>
      <option value="security_auditor">보안 감사</option>
    </select>
    <label>처리자 이메일 (기록용)</label>
    <input name="actor" type="email" placeholder="hub@example.org" />
    <button type="submit">추가</button>
  </form>
  <div id="out" class="out" style="display: none"></div>
  <script src="api.js"></script>
  <script>
    document.getElementById("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const el = document.getElementById("out");
      el.style.display = "block";
      const actor = fd.get("actor").trim() || "hub@local";
      const email = fd.get("email").trim();
      try {
        await api("/api/tenants/" + fd.get("tid") + "/users", {
          method: "POST",
          headers: { "X-Actor-Email": actor },
          json: true,
          body: JSON.stringify({ email, display_name: email.split("@")[0], role: fd.get("role") }),
        });
        el.className = "out";
        el.textContent = "추가했습니다.\n다음: «데이터셋» 페이지로 이동하세요.";
      } catch (err) {
        el.className = "out err";
        el.textContent = err.message;
      }
    });
  </script>
</body>
</html>
